name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: go build -o user-post-api .

      - name: Install Railway CLI
        run: |
          curl -L https://github.com/railwayapp/cli/releases/latest/download/railway_linux_amd64.tar.gz -o railway.tar.gz
          tar -xzf railway.tar.gz
          chmod +x railway
          sudo mv railway /usr/local/bin/

      - name: Deploy to Railway
        run: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}