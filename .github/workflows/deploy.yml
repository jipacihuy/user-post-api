name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o user-post-api .

      - name: Deploy to Railway
        uses: codedbyryan/railway-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}