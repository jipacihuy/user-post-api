name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: go build -o user-post-api .

      - name: Install Railway CLI
        run: |
          set -e
          # Ambil URL download asset terbaru
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/railwayapp/cli/releases/latest | grep -oP '"browser_download_url":\s*"\K[^"]+linux_amd64\.tar\.gz')
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o railway.tar.gz
          tar -xzf railway.tar.gz
          chmod +x railway
          sudo mv railway /usr/local/bin/
          railway --version

      - name: Deploy to Railway
        run: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}